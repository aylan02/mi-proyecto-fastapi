<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Detalle del Producto | CosmeLogix</title>

    <link rel="stylesheet" href="/static/css/landing.css">

</head>

<body>

<header class="navbar">

    <div class="logo">

        <img src="/static/img/logo-cosmelogix.jpg" alt="CosmeLogix">

        <span>CosmeLogix</span>

    </div>

    <nav>

        <a href="/">Inicio</a>

        <a href="#">Catálogo</a>

        <a href="#">Contacto</a>

    </nav>

    <div class="acciones">

        <button class="btn-login">

            Iniciar sesión

        </button>

    </div>

</header>


<section class="detalle-producto">

    <div class="detalle-imagen">

        <div class="placeholder-img">

            📦

        </div>

    </div>

    <div class="detalle-info">

        <span class="categoria">

            Cargando...

        </span>

        <h1 id="nombre-producto">

            Cargando producto...

        </h1>

        <p id="marca-producto">

            Marca

        </p>

        <h2 id="precio-producto">

            $0

        </h2>

        <p id="descripcion-producto">

            Descripción del producto.

        </p>

        <p id="stock-producto">

            Stock

        </p>

        <button class="btn-agregar-carrito">

            Agregar al carrito

        </button>

    </div>

</section>

<script src="/static/js/producto.js"></script>

</body>

</html>
